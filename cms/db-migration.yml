apiVersion: batch/v1
kind: Job
metadata:
  name: cms-prisma-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: somkumarva/cms-web:db173d7c2071548fd852127efb5db9ab7c2f3ec6
          command: ["pnpm", "db:migrate"]
          envFrom:
            - secretRef:
                name: cms-env
